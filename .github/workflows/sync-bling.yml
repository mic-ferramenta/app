name: Sync Bling Products

on:
  schedule:
    # Roda a cada 5 minutos. O GitHub não garante o horário exato
    # (pode atrasar alguns minutos em horários de pico), mas na prática
    # costuma rodar bem próximo disso.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions

concurrency:
  group: sync-bling
  cancel-in-progress: true # se uma nova execução começar, cancela a anterior em vez de empilhar

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # sincroniza clientes + produtos (com variações); ajuste pra cima se seu catálogo crescer bastante
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm install @supabase/supabase-js

      - name: Rodar sincronização com o Bling
        run: node scripts/sync-bling.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BLING_CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          BLING_CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}